name: "Release Windows .exe"

on:
  push:
    tags:
      - "v*" # Trigger auf Tags, die mit "v" beginnen (z. B. v1.0.0)

jobs:
  build-and-release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Stellt sicher, dass der Tag zum Hauptbranch (main) gehört
      - name: Check if tag is on main branch
        run: |
          git fetch origin main
          git branch --contains ${{ github.ref_name }} | findstr "main"
        shell: cmd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PlannerPioneer ${{ github.ref_name }}"
          releaseBody: "Release von PlannerPioneer ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
